<div class="login-container">
    <h2>Iniciar Sesión</h2>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      
      <div>
        <label for="email">Correo Electrónico:</label>
        <input id="email" formControlName="email" type="email" />
        <div *ngIf="emailControl.invalid && emailControl.touched">
          <small>Por favor ingresa un correo válido.</small>
        </div>
      </div>
  
      <div>
        <label for="password">Contraseña:</label>
        <input id="password" formControlName="password" type="password" />
        <div *ngIf="passwordControl.invalid && passwordControl.touched">
          <small>La contraseña es requerida.</small>
        </div>
      </div>
  
      <button type="submit" [disabled]="loginForm.invalid">Iniciar Sesión</button>
    </form>
  </div>
